name: Ricerca bandi formatori e universita'

on:
  # Ogni 4 giorni, alle 05:00 UTC (07:00 ora italiana legale).
  schedule:
    - cron: "0 5 */4 * *"
  # Permette di lanciarla a mano dalla scheda "Actions" di GitHub.
  workflow_dispatch:

permissions:
  contents: write   # per committare lo stato aggiornato (dati/)
  issues: write     # per aprire la issue di notifica

concurrency:
  group: ricerca-bandi
  cancel-in-progress: false

jobs:
  cerca:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install ddgs

      - name: Ricerca bandi formatori
        continue-on-error: true
        run: python scripts/cerca_bandi.py

      - name: Ricerca docenze e tutoraggi universita'
        continue-on-error: true
        run: python scripts/cerca_universita.py

      - name: Salva stato aggiornato (commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dati/
          if git diff --staged --quiet; then
            echo "Nessuna modifica allo stato."
          else
            git commit -m "Aggiornamento automatico risultati ricerca bandi"
            git push
          fi

      - name: Apri issue per nuovi bandi formatori
        if: ${{ hashFiles('nuovi_bandi.md') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Nuovi bandi formatori - $(date +%F)" \
            --body-file nuovi_bandi.md \
            --assignee panpauline \
            --label "bandi-formatori" 2>/dev/null \
          || gh issue create \
            --title "Nuovi bandi formatori - $(date +%F)" \
            --body-file nuovi_bandi.md \
            --assignee panpauline

      - name: Apri issue per nuove docenze/tutoraggi universita
        if: ${{ hashFiles('nuovi_universita.md') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Nuove docenze/tutoraggi universita - $(date +%F)" \
            --body-file nuovi_universita.md \
            --assignee panpauline \
            --label "bandi-universita" 2>/dev/null \
          || gh issue create \
            --title "Nuove docenze/tutoraggi universita - $(date +%F)" \
            --body-file nuovi_universita.md \
            --assignee panpauline
